name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Resolve SPM dependencies
        run: cd App && swift package resolve

      - name: Import code-signing certificate
        env:
          CODESIGN_P12_B64: ${{ secrets.CODESIGN_P12_B64 }}
          CODESIGN_P12_PASSWORD: ${{ secrets.CODESIGN_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/codesign.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          P12_PATH="$RUNNER_TEMP/codesign.p12"

          echo "$CODESIGN_P12_B64" | base64 --decode > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -P "$CODESIGN_P12_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
              -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Делает временный keychain видимым для codesign в дополнение к login.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')

          rm -f "$P12_PATH"

      - name: Build .app bundle
        run: cd App && ./build.sh

      - name: Build DMG
        run: |
          chmod +x .github/scripts/make_dmg.sh
          .github/scripts/make_dmg.sh ${{ steps.version.outputs.version }}

      - name: Sign DMG with Sparkle EdDSA
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_PATH="App/dist/QY-${{ steps.version.outputs.version }}.dmg"
          SIGN_UPDATE="App/.build/artifacts/sparkle/Sparkle/bin/sign_update"
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret missing — clients won't accept the update"
            exit 1
          fi
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key.pem
          chmod 600 /tmp/sparkle_key.pem
          SIG_ATTRS=$("$SIGN_UPDATE" -f /tmp/sparkle_key.pem "$DMG_PATH")
          rm -f /tmp/sparkle_key.pem
          echo "sig_attrs=$SIG_ATTRS" >> $GITHUB_OUTPUT

      - name: Resolve release notes
        id: notes
        run: |
          NOTES_FILE=".github/release-notes/${{ github.ref_name }}.html"
          if [ -f "$NOTES_FILE" ]; then
            echo "file=$NOTES_FILE" >> $GITHUB_OUTPUT
          else
            echo "file=" >> $GITHUB_OUTPUT
          fi

      - name: Generate appcast.xml
        run: |
          NOTES_ARG=""
          if [ -n "${{ steps.notes.outputs.file }}" ]; then
            NOTES_ARG="--notes-html ${{ steps.notes.outputs.file }}"
          fi
          python3 .github/scripts/make_appcast.py \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ github.run_number }}" \
            --sig-attrs '${{ steps.sign.outputs.sig_attrs }}' \
            $NOTES_ARG \
            --output App/dist/appcast.xml

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ steps.notes.outputs.file }}" ]; then
            gh release create "${{ github.ref_name }}" \
              App/dist/QY-${{ steps.version.outputs.version }}.dmg \
              App/dist/appcast.xml \
              --title "${{ github.ref_name }}" \
              --notes-file "${{ steps.notes.outputs.file }}"
          else
            gh release create "${{ github.ref_name }}" \
              App/dist/QY-${{ steps.version.outputs.version }}.dmg \
              App/dist/appcast.xml \
              --title "${{ github.ref_name }}" \
              --notes "Auto-generated release. See commits for changes."
          fi

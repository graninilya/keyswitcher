name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Install Python deps
        run: pip3 install --break-system-packages pillow cairosvg

      - name: Generate dictionary assets
        run: python3 scripts/build_assets.py

      - name: Build .app bundle
        run: |
          cd App
          ./build.sh

      - name: Build DMG
        run: |
          chmod +x scripts/make_dmg.sh
          scripts/make_dmg.sh ${{ steps.version.outputs.version }}

      - name: Sign appcast with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::warning::SPARKLE_PRIVATE_KEY secret not set — skipping appcast signing"
            exit 0
          fi
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key.pem
          DMG_PATH="App/dist/QY-${{ steps.version.outputs.version }}.dmg"
          # Sparkle's sign_update tool produces signature for embedding in appcast.xml
          SIGNATURE=$(App/.build/checkouts/Sparkle/bin/sign_update -f /tmp/sparkle_key.pem "$DMG_PATH" 2>&1 | tail -1)
          rm /tmp/sparkle_key.pem
          echo "SIGNATURE=$SIGNATURE" >> $GITHUB_ENV

      - name: Generate appcast.xml
        run: |
          python3 scripts/make_appcast.py \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ github.run_number }}" \
            --dmg "App/dist/QY-${{ steps.version.outputs.version }}.dmg" \
            --signature "${SIGNATURE:-}" \
            --output App/dist/appcast.xml

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            App/dist/QY-${{ steps.version.outputs.version }}.dmg \
            App/dist/appcast.xml \
            --title "${{ github.ref_name }}" \
            --notes "Auto-generated release. See commits for changes."

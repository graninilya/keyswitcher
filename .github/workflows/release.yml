name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" App/Info.plist

      - name: Resolve SPM dependencies
        run: cd App && swift package resolve

      - name: Build .app bundle
        run: cd App && ./build.sh

      - name: Build DMG
        run: |
          chmod +x scripts/make_dmg.sh
          scripts/make_dmg.sh ${{ steps.version.outputs.version }}

      - name: Sign DMG with Sparkle EdDSA
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_PATH="App/dist/QY-${{ steps.version.outputs.version }}.dmg"
          SIGN_UPDATE="App/.build/artifacts/sparkle/Sparkle/bin/sign_update"
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret missing — clients won't accept the update"
            exit 1
          fi
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key.pem
          chmod 600 /tmp/sparkle_key.pem
          SIG_ATTRS=$("$SIGN_UPDATE" -f /tmp/sparkle_key.pem "$DMG_PATH")
          rm -f /tmp/sparkle_key.pem
          echo "sig_attrs=$SIG_ATTRS" >> $GITHUB_OUTPUT

      - name: Generate appcast.xml
        run: |
          python3 scripts/make_appcast.py \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ github.run_number }}" \
            --sig-attrs '${{ steps.sign.outputs.sig_attrs }}' \
            --output App/dist/appcast.xml

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            App/dist/QY-${{ steps.version.outputs.version }}.dmg \
            App/dist/appcast.xml \
            --title "${{ github.ref_name }}" \
            --notes "Auto-generated release. See commits for changes."
